id: builder-deposit-spam
name: "GLOAS: Spam batched 0x03 builder deposits"
description: |
  Stress test for the GLOAS builder deposit path. Deploys a tiny batch
  contract and uses it to register `totalDeposits` (default 1000)
  builders with 0x03 credentials at `batchSize` (default 100) deposits
  per tx, capped at `pendingBatches` in-flight.

  After spamming, asserts the chain still finalizes (1 finalized epoch,
  no more than 4 unfinalized) — i.e. the deposit storm does not break
  finality.

  Optional `skipForkActivationCheck` to bypass the GLOAS-epoch wait on
  long-running devnets.
version: 1.0.0
tags: [gloas, builder, deposit, eip-6110, spam, stability]
timeout: 1h
config:
  walletPrivkey: ''
  depositContract: '0x00000000219ab540356cBB839Cbe05303d7705Fa'
  # Each batch tx fans out into batchSize deposits; CL validates every BLS signature individually.
  batchSize: 100
  # Total deposits to push through the chain. Set to 0 to run unbounded until timeout.
  totalDeposits: 1000
  # Hard cap of in-flight batches so we don't drown the mempool.
  pendingBatches: 4
  # Deposit amount per validator (ETH). 1 ETH keeps funding cheap on devnets.
  depositAmount: 1
  # Set to true to skip waiting for the GLOAS fork to activate before spamming.
  skipForkActivationCheck: false
tasks:
  - name: check_clients_are_healthy
    title: Check that at least one client is ready
    timeout: 5m
    config:
      minClientCount: 1

  - name: get_consensus_specs
    id: get_specs
    title: Get consensus chain specs
    if: "skipForkActivationCheck == false"

  - name: check_consensus_slot_range
    title: "Wait for GLOAS activation (epoch >= ${{ tasks.get_specs.outputs.specs.GLOAS_FORK_EPOCH }})"
    timeout: 1h
    if: "skipForkActivationCheck == false"
    configVars:
      minEpochNumber: "tasks.get_specs.outputs.specs.GLOAS_FORK_EPOCH"

  - name: generate_child_wallet
    id: spam_wallet
    title: Generate funded wallet for batched deposits
    config:
      walletSeed: builder-deposit-spam
    configVars:
      privateKey: walletPrivkey
      # Wallet must hold totalDeposits * depositAmount + headroom for tx fees.
      # jq expression below = (totalDeposits * depositAmount + 50) * 1e18 wei.
      prefundMinBalance: '| ((.totalDeposits * .depositAmount + 50) * 1000000000000000000)'

  - name: get_random_mnemonic
    id: spam_mnemonic
    title: Generate fresh mnemonic for spam validators

  - name: generate_batch_deposits
    title: Deploy BatchDeposit and spam ${totalDeposits} 0x03 builder deposits in batches of ${batchSize}
    timeout: 45m
    config:
      awaitReceipt: true
      awaitInclusion: true
      failOnReject: true
    configVars:
      walletPrivkey: tasks.spam_wallet.outputs.childWallet.privkey
      mnemonic: tasks.spam_mnemonic.outputs.mnemonic
      depositContract: depositContract
      batchSize: batchSize
      limitTotal: totalDeposits
      limitPendingBatches: pendingBatches
      depositAmount: depositAmount
      # 0x03 builder withdrawal credentials — version byte (0x03) + 11 zero bytes + 20-byte address.
      withdrawalCredentials: '| "0x03" + ("00" * 11) + (.tasks.spam_wallet.outputs.childWallet.address | ltrimstr("0x"))'

  - name: check_consensus_finality
    title: Verify the chain still finalizes under deposit load
    timeout: 15m
    config:
      minFinalizedEpochs: 1
      maxUnfinalizedEpochs: 4
      failOnCheckMiss: true
