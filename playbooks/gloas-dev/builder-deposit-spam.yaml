id: builder-deposit-spam
name: "GLOAS: Spam builder deposits (EIP-8282)"
description: |
  Stress test for the GLOAS builder deposit path. Registers `totalDeposits`
  (default 1000) builders via the builder deposit system contract (EIP-8282),
  with up to `pendingDeposits` transactions in flight at a time.

  Builder deposits are raw-calldata requests (no deposit() selector, no batch
  contract), so each builder is its own transaction; throughput is controlled by
  the in-flight cap rather than per-tx batching. The consensus layer validates
  every BLS proof-of-possession individually on dequeue.

  After spamming, asserts the chain still finalizes (1 finalized epoch, no more
  than 4 unfinalized) — i.e. the deposit storm does not break finality.

  Optional `skipForkActivationCheck` to bypass the GLOAS-epoch wait on
  long-running devnets.
version: 1.0.0
tags: [gloas, builder, deposit, eip-8282, spam, stability]
timeout: 1h
config:
  walletPrivkey: ''
  # Builder deposit system contract (EIP-8282).
  builderDepositContract: '0x0000bFF46984e3725691FA540a8C7589300D8282'
  # Total deposits to push through the chain. Set to 0 to run unbounded until timeout.
  totalDeposits: 1000
  # Hard cap of in-flight deposit transactions so we don't drown the mempool.
  pendingDeposits: 200
  # Deposit amount per builder (ETH). 1 ETH is the minimum builder deposit.
  depositAmount: 1
  # Percentage (0-100) of deposits to generate with corrupted signatures.
  invalidSigPerc: 0
  # Set to true to skip waiting for the GLOAS fork to activate before spamming.
  skipForkActivationCheck: false
tasks:
  - name: check_clients_are_healthy
    title: Check that at least one client is ready
    timeout: 5m
    config:
      minClientCount: 1

  - name: get_consensus_specs
    id: get_specs
    title: Get consensus chain specs
    if: "skipForkActivationCheck == false"

  - name: check_consensus_slot_range
    title: "Wait for GLOAS activation (epoch >= ${{ tasks.get_specs.outputs.specs.GLOAS_FORK_EPOCH }})"
    timeout: 1h
    if: "skipForkActivationCheck == false"
    configVars:
      minEpochNumber: "tasks.get_specs.outputs.specs.GLOAS_FORK_EPOCH"

  - name: check_consensus_block_proposals
    title: "Wait for block proposal to fix fee estimation"
    config:
      blockCount: 2
      checkLookback: 0

  - name: generate_child_wallet
    id: spam_wallet
    title: Generate funded wallet for builder deposits
    config:
      walletSeed: builder-deposit-spam
    configVars:
      privateKey: walletPrivkey
      # Wallet must hold totalDeposits * depositAmount + headroom for tx fees.
      # jq expression below = (totalDeposits * depositAmount + 50) * 1e18 wei.
      prefundMinBalance: '| ((.totalDeposits * .depositAmount + 50) * 1000000000000000000)'

  - name: get_random_mnemonic
    id: spam_mnemonic
    title: Generate fresh mnemonic for spam builders

  - name: generate_builder_deposits
    title: Spam ${totalDeposits} builder deposits (EIP-8282), up to ${pendingDeposits} in flight
    timeout: 45m
    config:
      awaitReceipt: true
      awaitInclusion: true
      failOnReject: true
    configVars:
      walletPrivkey: tasks.spam_wallet.outputs.childWallet.privkey
      mnemonic: tasks.spam_mnemonic.outputs.mnemonic
      builderDepositContract: builderDepositContract
      limitTotal: totalDeposits
      indexCount: totalDeposits
      limitPending: pendingDeposits
      depositAmount: depositAmount
      invalidSigPercent: invalidSigPerc

  - name: check_consensus_finality
    title: Verify the chain still finalizes under deposit load
    timeout: 15m
    config:
      minFinalizedEpochs: 1
      maxUnfinalizedEpochs: 4
      failOnCheckMiss: true
