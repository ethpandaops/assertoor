id: builder-lifecycle
name: "GLOAS: Builder Lifecycle Test (both onboarding paths)"
description: |
  End-to-end lifecycle for GLOAS builders (EIP-8282), exercising BOTH ways a
  builder can be onboarded.

  When the test is started BEFORE GLOAS activation:
  1. PRE-FORK onboarding: deposit builderCount builders a few slots BEFORE GLOAS
     activates, using the regular validator deposit contract with 0xB0 (builder)
     withdrawal credentials. These deposits sit in the pending-deposit queue and,
     because they reach the fork unprocessed, are converted to builders at the
     fork by `onboard_builders_from_pending_deposits`. Their signatures are
     verified under the regular DOMAIN_DEPOSIT (NOT the builder domain), so the
     ordinary `generate_deposits` task is used unchanged.
  2. POST-FORK deposits: after the first GLOAS block (once the builder deposit
     system contract's fee inhibitor has been cleared), deposit builderCount more
     builders via the new builder deposit system contract (raw calldata, signed
     under DOMAIN_BUILDER_DEPOSIT).

  When the test is started AFTER GLOAS activation, the pre-fork path is no longer
  possible, so ALL 2*builderCount builders are deposited via the new builder
  deposit contract instead.

  Then:
  3. Wait for all builders to become active.
  4. Exit them via builder exit requests (EIP-8282), spread across 2 epochs, and
     verify they enter the exiting state.
  5. (Only when MIN_BUILDER_WITHDRAWABILITY_DELAY < 10 epochs) Wait for the exited
     builders to be fully withdrawn (balance 0), re-deposit a fresh set via the
     builder contract, and verify they REUSE the freed builder indices. With the
     default delay (8192 epochs) full withdrawal is not observable in a
     short-lived run, so that phase is skipped.
version: 1.0.0
tags: [gloas, builder, lifecycle, deposit, exit, eip-8282]
timeout: 2h
config:
  walletPrivkey: ''
  # Regular validator deposit contract (pre-fork builder onboarding via 0xB0 creds).
  depositContract: '0x00000000219ab540356cBB839Cbe05303d7705Fa'
  # EIP-8282 builder system contracts (post-fork deposits / exits).
  builderDepositContract: '0x0000bFF46984e3725691FA540a8C7589300D8282'
  builderExitContract: '0x000064D678505ad48F8cCb093BC65613800E8282'
  # Builders per onboarding path.
  builderCount: 5
  depositAmount: 5

tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

# get consensus specs and current slot, then calculate deposit timing
- name: get_consensus_specs
  id: get_specs
  title: "Get consensus chain specs"

- name: check_consensus_slot_range
  id: current_slot
  title: "Get current slot"

- name: run_shell
  id: calc_slots
  title: "Calculate fork-relative deposit timing"
  config:
    envVars:
      GLOAS_FORK_EPOCH: "tasks.get_specs.outputs.specs.GLOAS_FORK_EPOCH"
      SLOTS_PER_EPOCH: "tasks.get_specs.outputs.specs.SLOTS_PER_EPOCH"
      CURRENT_SLOT: "tasks.current_slot.outputs.currentSlot"
    command: |
      set -e
      GLOAS_FORK_EPOCH=$(echo "$GLOAS_FORK_EPOCH" | jq -r .)
      SLOTS_PER_EPOCH=$(echo "$SLOTS_PER_EPOCH" | jq -r .)
      CURRENT_SLOT=$(echo "$CURRENT_SLOT" | jq -r .)

      ACTIVATION_SLOT=$((GLOAS_FORK_EPOCH * SLOTS_PER_EPOCH))
      # Pre-fork deposits land a few slots before activation so they reach the fork
      # still pending and get onboarded as builders.
      PREFORK_SLOT_COUNT=$((SLOTS_PER_EPOCH / 3))
      PREFORK_SLOT=$((ACTIVATION_SLOT - PREFORK_SLOT_COUNT))

      if [ "$CURRENT_SLOT" -lt "$PREFORK_SLOT" ]; then
        # Started before the fork: exercise both onboarding paths.
        IS_PREFORK=true
        POSTFORK_SLOT=$((ACTIVATION_SLOT + 4))
        ACTIVE_EPOCH=$((GLOAS_FORK_EPOCH + 4))
        echo "Mode: pre-fork start (regular-contract onboarding + new-contract deposits)"
      else
        # Started at/after the fork: pre-fork onboarding is no longer possible,
        # so deposit everything via the new builder contract.
        IS_PREFORK=false
        # A couple slots ahead, and at least 2 slots past activation so the
        # builder deposit contract's EXCESS_INHIBITOR has been cleared.
        POSTFORK_SLOT=$((CURRENT_SLOT + 2))
        if [ "$POSTFORK_SLOT" -lt "$((ACTIVATION_SLOT + 2))" ]; then
          POSTFORK_SLOT=$((ACTIVATION_SLOT + 2))
        fi
        ACTIVE_EPOCH=$(( (POSTFORK_SLOT / SLOTS_PER_EPOCH) + 4 ))
        echo "Mode: post-fork start (all builders via the new builder contract)"
      fi

      echo "Current slot:       $CURRENT_SLOT"
      echo "GLOAS activation:   epoch $GLOAS_FORK_EPOCH (slot $ACTIVATION_SLOT)"
      echo "Pre-fork deposits:  slot $PREFORK_SLOT (used: $IS_PREFORK)"
      echo "Post-fork deposits: slot $POSTFORK_SLOT"
      echo "Active wait epoch:  $ACTIVE_EPOCH"

      echo "::set-output-json isPreFork $IS_PREFORK"
      echo "::set-output-json preforkSlot $PREFORK_SLOT"
      echo "::set-output-json postforkSlot $POSTFORK_SLOT"
      echo "::set-output-json activeEpoch $ACTIVE_EPOCH"

# prepare wallet and mnemonic
- name: generate_child_wallet
  id: test_wallet
  title: "Generate wallet for builder operations"
  config:
    walletSeed: builder-lifecycle-test
    prefundMinBalance: 200000000000000000000  # 200 ETH
  configVars:
    privateKey: walletPrivkey

- name: get_random_mnemonic
  id: test_mnemonic
  title: "Generate mnemonic for builders"

- name: get_pubkeys_from_mnemonic
  id: builder_pubkeys
  title: "Get pubkeys for all builder keys"
  configVars:
    mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
    # 2*builderCount for the two onboarding paths, plus builderCount fresh keys
    # for the (conditional) index-reuse re-deposit.
    count: "| .builderCount * 3"

##
## PHASE 1a: PRE-FORK onboarding (only when started before the fork)
##  Deposit builderCount builders (keys 0..builderCount-1) via the regular deposit
##  contract with 0xB0 credentials, before GLOAS activates. They are onboarded as
##  builders at the fork (onboard_builders_from_pending_deposits), which verifies
##  the signature under the regular DOMAIN_DEPOSIT.
##

- name: check_consensus_slot_range
  title: "Wait for pre-fork deposit slot (${{ tasks.calc_slots.outputs.preforkSlot }})"
  timeout: 1h
  if: "| .tasks.calc_slots.outputs.isPreFork"
  configVars:
    minSlotNumber: "tasks.calc_slots.outputs.preforkSlot"

- name: generate_deposits
  id: prefork_deposits
  title: "Pre-fork: deposit ${builderCount} builders (regular contract, 0xB0 creds)"
  if: "| .tasks.calc_slots.outputs.isPreFork"
  config:
    awaitReceipt: true
    failOnReject: true
  configVars:
    limitTotal: "builderCount"
    indexCount: "builderCount"
    startIndex: "| 0"
    depositAmount: "depositAmount"
    walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
    mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
    depositContract: "depositContract"
    # 0xB0 builder credentials: version byte + 11 zero bytes + 20-byte address
    withdrawalCredentials: '| "0xB0" + ("00" * 11) + (.tasks.test_wallet.outputs.childWallet.address | ltrimstr("0x"))'

##
## PHASE 1b: POST-FORK deposits
##  After the first GLOAS block, deposit builders via the new builder deposit
##  system contract (EIP-8282). When started before the fork this deposits the
##  second half (keys builderCount..2*builderCount-1); when started after the
##  fork it ALSO deposits the first half (keys 0..builderCount-1), since the
##  pre-fork path was skipped.
##

- name: check_consensus_slot_range
  title: "Wait for post-fork deposit slot (${{ tasks.calc_slots.outputs.postforkSlot }})"
  timeout: 1h
  configVars:
    minSlotNumber: "tasks.calc_slots.outputs.postforkSlot"

# First half via the new contract — only when the pre-fork path was skipped.
- name: generate_builder_deposits
  id: postfork_deposits_first
  title: "Post-fork: deposit first ${builderCount} builders (EIP-8282 contract)"
  if: "| .tasks.calc_slots.outputs.isPreFork | not"
  config:
    awaitReceipt: true
    awaitInclusion: true
    failOnReject: true
  configVars:
    limitTotal: "builderCount"
    indexCount: "builderCount"
    startIndex: "| 0"
    depositAmount: "depositAmount"
    walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
    mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
    builderDepositContract: "builderDepositContract"

# Second half via the new contract — always.
- name: generate_builder_deposits
  id: postfork_deposits_second
  title: "Post-fork: deposit second ${builderCount} builders (EIP-8282 contract)"
  config:
    awaitReceipt: true
    awaitInclusion: true
    failOnReject: true
  configVars:
    limitTotal: "builderCount"
    indexCount: "builderCount"
    startIndex: "builderCount"
    depositAmount: "depositAmount"
    walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
    mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
    builderDepositContract: "builderDepositContract"

##
## PHASE 2: Wait for all builders (both paths) to become active
##

- name: check_consensus_slot_range
  title: "Wait until builders should be active (epoch ${{ tasks.calc_slots.outputs.activeEpoch }})"
  timeout: 1h
  configVars:
    minEpochNumber: "tasks.calc_slots.outputs.activeEpoch"

- name: run_task_matrix
  title: "Verify all ${{ .builderCount * 2 }} builders are active"
  timeout: 1h
  configVars:
    matrixValues: "| .tasks.builder_pubkeys.outputs.pubkeys[0:(.builderCount * 2)]"
  config:
    runConcurrent: true
    matrixVar: "builderPubkey"
    task:
      name: check_consensus_builder_status
      title: "Verify builder ${builderPubkey} is active"
      config:
        expectActive: true
        failOnCheckMiss: true
      configVars:
        builderPubKey: "builderPubkey"

##
## PHASE 3: Exit all builders via builder exit requests (EIP-8282)
##  Both halves exit via the builder exit contract, sent from the builder's
##  execution address (the test wallet). The two halves are exited an epoch apart
##  to exercise the exit queue across an epoch boundary.
##

- name: check_consensus_slot_range
  id: exit_start
  title: "Record epoch at start of exits"

# Exit the first half (keys 0..builderCount-1)
- name: run_task_matrix
  title: "Exit first ${builderCount} builders (EIP-8282)"
  configVars:
    matrixValues: "| .tasks.builder_pubkeys.outputs.pubkeys[0:.builderCount]"
  config:
    runConcurrent: true
    matrixVar: "builderPubkey"
    task:
      name: generate_builder_exits
      title: "Builder exit for ${builderPubkey}"
      config:
        limitTotal: 1
        limitPerSlot: 1
        awaitReceipt: true
        failOnReject: true
      configVars:
        sourcePubkey: "builderPubkey"
        walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
        builderExitContract: "builderExitContract"

# Wait for the next epoch so the second batch exits in a later epoch
- name: check_consensus_slot_range
  title: "Wait one epoch before exiting the second half"
  timeout: 30m
  configVars:
    minEpochNumber: "| (.tasks.exit_start.outputs.currentEpoch | tonumber) + 1"

# Exit the second half (keys builderCount..2*builderCount-1)
- name: run_task_matrix
  title: "Exit second ${builderCount} builders (EIP-8282)"
  configVars:
    matrixValues: "| .tasks.builder_pubkeys.outputs.pubkeys[.builderCount:(.builderCount * 2)]"
  config:
    runConcurrent: true
    matrixVar: "builderPubkey"
    task:
      name: generate_builder_exits
      title: "Builder exit for ${builderPubkey}"
      config:
        limitTotal: 1
        limitPerSlot: 1
        awaitReceipt: true
        failOnReject: true
      configVars:
        sourcePubkey: "builderPubkey"
        walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
        builderExitContract: "builderExitContract"

##
## PHASE 4: Verify all builders have entered the exiting state
##  (withdrawable_epoch set; full withdrawal itself takes
##  MIN_BUILDER_WITHDRAWABILITY_DELAY and is awaited only in phase 5).
##

- name: run_task_matrix
  title: "Verify all builders are exiting"
  timeout: 30m
  configVars:
    matrixValues: "| .tasks.builder_pubkeys.outputs.pubkeys[0:(.builderCount * 2)]"
  config:
    runConcurrent: true
    matrixVar: "builderPubkey"
    task:
      name: check_consensus_builder_status
      title: "Verify builder ${builderPubkey} is exiting"
      config:
        expectExiting: true
        failOnCheckMiss: true
      configVars:
        builderPubKey: "builderPubkey"

##
## PHASE 5: Builder index reuse (only when MIN_BUILDER_WITHDRAWABILITY_DELAY < 10)
##  Wait for all exited builders to be fully withdrawn (balance 0), then re-deposit
##  builderCount fresh builders (keys 2*builderCount..3*builderCount-1) via the
##  builder contract. get_index_for_new_builder reuses the lowest free index, so
##  processed in submission (key) order the fresh builders reuse indices
##  0..builderCount-1.
##

- name: run_task_matrix
  title: "Wait for all builders to be fully withdrawn (balance 0)"
  timeout: 1h
  if: "| (.tasks.get_specs.outputs.specs.MIN_BUILDER_WITHDRAWABILITY_DELAY | tonumber) < 10"
  configVars:
    matrixValues: "| .tasks.builder_pubkeys.outputs.pubkeys[0:(.builderCount * 2)]"
  config:
    runConcurrent: true
    matrixVar: "builderPubkey"
    task:
      name: check_consensus_builder_status
      title: "Wait for builder ${builderPubkey} to be withdrawn"
      config:
        expectExiting: true
        maxBuilderBalance: 0
      configVars:
        builderPubKey: "builderPubkey"

- name: generate_builder_deposits
  id: reuse_deposits
  title: "Re-deposit ${builderCount} fresh builders to test index reuse"
  if: "| (.tasks.get_specs.outputs.specs.MIN_BUILDER_WITHDRAWABILITY_DELAY | tonumber) < 10"
  config:
    awaitReceipt: true
    awaitInclusion: true
    failOnReject: true
  configVars:
    limitTotal: "builderCount"
    indexCount: "builderCount"
    startIndex: "| .builderCount * 2"
    depositAmount: "depositAmount"
    walletPrivkey: "tasks.test_wallet.outputs.childWallet.privkey"
    mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
    builderDepositContract: "builderDepositContract"

- name: check_consensus_slot_range
  id: reuse_active_wait
  title: "Record epoch before waiting for reused builders to activate"
  if: "| (.tasks.get_specs.outputs.specs.MIN_BUILDER_WITHDRAWABILITY_DELAY | tonumber) < 10"

- name: check_consensus_slot_range
  title: "Wait for reused builders to finalize+activate"
  timeout: 30m
  if: "| (.tasks.get_specs.outputs.specs.MIN_BUILDER_WITHDRAWABILITY_DELAY | tonumber) < 10"
  configVars:
    minEpochNumber: "| (.tasks.reuse_active_wait.outputs.currentEpoch | tonumber) + 3"

- name: run_task_matrix
  title: "Verify fresh builders reused freed builder indices 0..${{ .builderCount - 1 }}"
  if: "| (.tasks.get_specs.outputs.specs.MIN_BUILDER_WITHDRAWABILITY_DELAY | tonumber) < 10"
  configVars:
    # [index, pubkey] pairs for the re-deposited keys; the i-th fresh builder
    # should reuse freed builder index i.
    matrixValues: "| .builderCount as $n | .tasks.builder_pubkeys.outputs.pubkeys as $pk | [range(0; $n)] | map([., $pk[(. + ($n * 2))]])"
  config:
    runConcurrent: true
    matrixVar: "reuseEntry"
    task:
      name: check_consensus_builder_status
      title: "Verify reused builder ${{ .reuseEntry[1] }} has index ${{ .reuseEntry[0] }}"
      config:
        failOnCheckMiss: true
      configVars:
        builderPubKey: "| .reuseEntry[1]"
        builderIndex: "| .reuseEntry[0]"
