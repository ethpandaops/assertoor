id: builder-deposit
name: "GLOAS: Builder Deposit (0x03 credentials)"
description: |
  Minimal deposit test for the GLOAS builder role. Generates a fresh
  wallet + mnemonic and submits a single 5-ETH deposit with 0x03
  withdrawal credentials (i.e. `0x03 || 11×0x00 || 20-byte address`).

  Verifies the deposit pipeline accepts builder-tagged credentials
  on a GLOAS devnet. Awaits both EL receipt and CL inclusion.
version: 1.0.0
tags: [gloas, builder, deposit, eip-6110]
timeout: 30m
config:
  walletPrivkey: ''
  depositContract: '0x00000000219ab540356cBB839Cbe05303d7705Fa'  # Mainnet deposit contract
tasks:
  - name: check_clients_are_healthy
    title: Check if at least one client is ready
    timeout: 5m
    config:
      minClientCount: 1
  - name: generate_child_wallet
    id: test_wallet
    title: Generate wallet for deposit operations
    config:
      walletSeed: builder-deposit-test
      prefundMinBalance: 10000000000000000000
    configVars:
      privateKey: walletPrivkey
  - name: get_random_mnemonic
    id: test_mnemonic
    title: Generate random mnemonic for test validator
  - name: generate_deposits
    title: Generate validator deposit with 0x03 credentials
    config:
      limitTotal: 1
      depositAmount: 5
      awaitReceipt: true
      awaitInclusion: true
    configVars:
      walletPrivkey: tasks.test_wallet.outputs.childWallet.privkey
      mnemonic: tasks.test_mnemonic.outputs.mnemonic
      depositContract: depositContract
      withdrawalCredentials: '| "0x03" + ("00" * 11) + (.tasks.test_wallet.outputs.childWallet.address | ltrimstr("0x"))'