id: block-proposal-check
name: "Every client pair proposed a block"
description: |
  Verifies that every configured `validatorPairNames` entry has proposed at
  least one block. Uses a task matrix to run one wait-for-proposal check per
  client pair concurrently.

  Useful as a network-wide liveness check after starting a multi-client
  devnet to confirm all proposer duties are firing.
version: 1.0.0
tags: [health-check, consensus]
timeout: 20m
disable: false
config:
  validatorPairNames: []
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: run_task_matrix
  title: "Check block proposals from all client pairs"
  configVars:
    matrixValues: "validatorPairNames"
  config:
    runConcurrent: true
    matrixVar: "validatorPairName"
    task:
      name: check_consensus_block_proposals
      title: "Wait for block proposal from ${validatorPairName}"
      configVars:
        validatorNamePattern: "validatorPairName"
