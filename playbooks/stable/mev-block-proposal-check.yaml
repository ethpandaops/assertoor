id: mev-block-proposal-check
name: "Every client pair proposed an MEV-built block"
description: |
  Verifies that every configured `validatorPairNames` entry has proposed at
  least one block whose `extra_data` matches `mevExtraDataPattern` (default
  "hello world"). This pattern is typically set by a mock MEV-boost relay.

  Use this to confirm builder-API integration is working end-to-end for every
  CL client and validator pair.
version: 1.0.0
tags: [health-check, mev, consensus]
timeout: 20m
disable: false
config:
  validatorPairNames: []
  mevExtraDataPattern: "hello world"
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: run_task_matrix
  title: "Check block proposals with MEV extra data from all client pairs"
  configVars:
    matrixValues: "validatorPairNames"
  config:
    runConcurrent: true
    matrixVar: "validatorPairName"
    task:
      name: check_consensus_block_proposals
      title: "Wait for block proposal from ${validatorPairName}"
      configVars:
        validatorNamePattern: "validatorPairName"
        extraDataPattern: "mevExtraDataPattern"
