
id: ethconfig-test
name: "eth_config RPC consistency (EIP-7910)"
description: |
  Calls the EIP-7910 `eth_config` RPC on every configured EL client and
  asserts the responses are byte-identical.

  `eth_config` is a chain-fingerprint endpoint that exposes the active
  chain config so clients can detect mismatched genesis / fork
  parameters. Divergence here is a serious operational bug.
version: 1.0.0
tags: [fusaka, kurtosis, eip-7910, rpc, consistency, execution]
timeout: 1h
config:
#walletPrivkey: ""
tasks:
  - name: check_clients_are_healthy
    title: "Wait for at least one client to be responding"
    timeout: 5m
    config:
      minClientCount: 1
  - name: check_eth_config
    title: "Check eth_config consistency across all execution clients"
    timeout: 5m
    config:
      failOnMismatch: true
      excludeSyncingClients: false
