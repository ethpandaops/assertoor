id: verkle-conversion-check
name: "Verify verkle state-conversion progress"
description: |
  Tracks the verkle state-conversion process across all EL clients.

  Concurrently runs:

  - `check_clients_are_healthy` so we notice if a client dies mid-way.
  - A matrix over EL clients calling `check_execution_conversion_state`,
    which polls the verkle-conversion RPC until every client reports
    completion.

  Long timeout — conversion can take many hours on a populated chain.
version: 1.0.0
tags: [verkle, execution, health-check, stability]
timeout: 12h

tasks:
- name: check_clients_are_healthy
  title: "Check if all clients are ready"
  timeout: 5m
  config:
    maxUnhealthyCount: 0

- name: run_tasks_concurrent
  title: "Check verkle conversion state & network aliveness"
  config:
    tasks:
    - name: check_clients_are_healthy
      title: "Check if all clients are ready"
      config:
        pollInterval: 30s
        maxUnhealthyCount: 0
        failOnCheckMiss: true
    - name: run_task_matrix
      title: "Check verkle conversion state for all execution clients"
      timeout: 12h
      configVars:
        matrixValues: "clientPairNames"
      config:
        runConcurrent: true
        matrixVar: "clientPairName"
        task:
          name: check_execution_conversion_state
          title: "Check verkle conversion state for ${clientPairName}"
          config:
            expectStarted: true
            expectFinished: true
          configVars:
            clientPattern: "clientPairName"
