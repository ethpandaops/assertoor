id: bls-changes
name: "Generate BLS changes (Kurtosis)"
description: |
  Generates `validatorCount` (default 64) BLS credential changes from
  the kurtosis genesis mnemonic targeting `targetAddress`.

  Used standalone or as a building block in larger orchestrations
  (e.g. `pectra-all`). Does not verify inclusion — pair with a
  `check_consensus_block_proposals` test if you need that.
version: 1.0.0
tags: [pectra, kurtosis, bls-change, utility]
timeout: 1h
config:
  validatorCount: 64
  targetAddress: "0x65D08a056c17Ae13370565B04cF77D2AfA1cB9FA"
  validatorMnemonic: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"

tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: check_consensus_slot_range
  title: "Wait for slot >= 1"
  timeout: 2h
  config:
    minSlotNumber: 1

- name: run_task_options
  title: "Generate ${validatorCount} BLS changes"
  config:
    task:
      name: generate_bls_changes
      title: "Generate ${validatorCount} BLS changes"
      configVars:
        mnemonic: "validatorMnemonic"
        targetAddress: "targetAddress"
        limitTotal: "validatorCount"
        indexCount: "validatorCount"
