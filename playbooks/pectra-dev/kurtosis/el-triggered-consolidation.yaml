
id: el-triggered-consolidation
name: "Single EL-triggered consolidation"
description: |
  Submits one EIP-7251 EL-triggered consolidation from
  `sourceValidatorIndex` into `targetValidatorIndex` and waits for the
  receipt.

  Smallest possible consolidation test — useful as a quick sanity check
  on Electra activation. Defaults to validators 6610 → 6611 (kurtosis
  default ranges).
version: 1.0.0
tags: [pectra, kurtosis, consolidation, eip-7251, el-triggered, utility]
timeout: 1h
config:
  #walletPrivkey: ""
  sourceValidatorIndex: 6610
  targetValidatorIndex: 6611
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: run_task_options
  title: "Generate consolidations"
  config:
    task:
      name: generate_consolidations
      title: "Consolidate Validator ${sourceValidatorIndex} to ${targetValidatorIndex}"
      config:
        sourceIndexCount: 1
        failOnReject: true
        awaitReceipt: true
      configVars:
        walletPrivkey: "walletPrivkey"
        sourceStartValidatorIndex: "sourceValidatorIndex"
        targetValidatorIndex: "targetValidatorIndex"
