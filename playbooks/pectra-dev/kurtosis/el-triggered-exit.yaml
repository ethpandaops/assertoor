
id: el-triggered-exit
name: "Single EL-triggered exit"
description: |
  Submits one EIP-7002 EL-triggered exit (withdrawAmount=0) for
  `validatorIndex` (default 20) by sending a raw transaction to the
  withdrawal-request contract with the pubkey + 8-byte zero amount.

  Minimal building block — useful for triggering an exit deterministically
  in larger orchestrations. Requires the validator to already have 0x01
  or 0x02 credentials matching the caller.
version: 1.0.0
tags: [pectra, kurtosis, exit, eip-7002, el-triggered, utility]
timeout: 1h
config:
  #walletPrivkey: ""
  validatorIndex: 20
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: check_consensus_validator_status
  title: "Get status for validator ${validatorIndex}"
  timeout: 48h
  config:
    validatorStatus:
    - active_ongoing
    validatorPubKeyResultVar: "validatorPubKey"
  configVars:
    validatorIndex: "validatorIndex"

- name: generate_transaction
  title: "Exit Validator ${validatorIndex} via EL"
  config:
    targetAddress: "0x00000961Ef480Eb55e80D19ad83579A64c007002"
    feeCap: 50000000000 # 50 gwei
    gasLimit: 1000000
    amount: "500000000000000000" # 0.5 ETH
    failOnReject: true
  configVars:
    privateKey: "walletPrivkey"
    # 0x0000000000000000 is the amount as uint64,  0 means full withdrawal / exit
    callData: "| .validatorPubKey + \"0000000000000000\""
