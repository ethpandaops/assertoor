
id: eip6110-double-deposit
name: "EIP-6110 double-deposit handling"
description: |
  Submits two 2 ETH deposits for the same fresh pubkey in the same slot
  via concurrent `generate_deposits` tasks. Verifies EIP-6110 handling
  when two deposits for the same pubkey appear in the deposit-requests
  list of a single block.

  Expected behavior: both deposits are processed, but the validator only
  activates once with combined balance.
version: 1.0.0
tags: [pectra, kurtosis, deposit, eip-6110]
timeout: 1h
config:
  walletPrivkey: ""
  depositContract: "0x00000000219ab540356cBB839Cbe05303d7705Fa"
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

# wait for electra activation
- name: get_consensus_specs
  id: get_specs
  title: "Get consensus chain specs"
- name: check_consensus_slot_range
  title: "Wait for electra activation"
  timeout: 1h
  configVars:
    minEpochNumber: "tasks.get_specs.outputs.specs.ELECTRA_FORK_EPOCH"

- name: get_random_mnemonic
  id: test_mnemonic
  title: "Generate random mnemonic"

- name: run_tasks_concurrent
  title: "Generate 2 deposits for same pubkey"
  config:
    tasks:
    - name: generate_deposits
      title: "Generate deposit with 2 ETH"
      config:
        limitTotal: 1
        limitPerSlot: 1
        limitPending: 1
        depositAmount: 2
        awaitReceipt: true
        failOnReject: true
      configVars:
        walletPrivkey: "walletPrivkey"
        mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
        depositContract: "depositContract"
    - name: generate_deposits
      title: "Generate deposits with 2 ETH"
      config:
        limitTotal: 1
        limitPerSlot: 1
        limitPending: 1
        depositAmount: 2
        awaitReceipt: true
        failOnReject: true
      configVars:
        walletPrivkey: "walletPrivkey"
        mnemonic: "tasks.test_mnemonic.outputs.mnemonic"
        depositContract: "depositContract"
