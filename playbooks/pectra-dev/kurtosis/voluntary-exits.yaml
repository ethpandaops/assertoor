id: voluntary-exits
name: "Generate voluntary exits (Kurtosis)"
description: |
  Generates `validatorCount` (default 64) voluntary exits starting at
  `validatorStartIndex` using the kurtosis genesis mnemonic.

  Does not verify inclusion — pair with a `check_consensus_block_proposals`
  task or call from a larger orchestration (e.g. `pectra-all`).
version: 1.0.0
tags: [pectra, kurtosis, exit, voluntary, utility]
timeout: 1h
config:
  validatorCount: 64
  validatorMnemonic: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"
  validatorStartIndex: 0

tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: run_task_options
  title: "Generate ${validatorCount} BLS changes"
  config:
    task:
      name: generate_exits
      title: "Exit ${validatorCount} Validators"
      configVars:
        mnemonic: "validatorMnemonic"
        limitTotal: "validatorCount"
        indexCount: "validatorCount"
        startIndex: "validatorStartIndex"

    