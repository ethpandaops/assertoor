id: pectra-massive-deposit
name: "Massive deposit (2× 1000 ETH, 0x01 creds)"
description: |
  Submits two 1000-ETH deposits with legacy 0x01 withdrawal credentials
  for fresh validators from a random mnemonic.

  Companion to `massive-deposit-0x02.yaml`; this variant verifies the
  protocol still caps 0x01 effective balance at 32 ETH and queues the
  excess for withdrawal. Long timeout (672h) for activation-queue
  patience.
version: 1.0.0
tags: [pectra, kurtosis, deposit, eip-6110, withdrawal]
timeout: 672h
config:
  #walletPrivkey: ""
  depositContract: "0x00000000219ab540356cBB839Cbe05303d7705Fa"

tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: generate_random_mnemonic
  title: "Generate random mnemonic"
  config:
    mnemonicResultVar: "validatorMnemonic"
- name: generate_child_wallet
  title: "Generate wallet for lifecycle test"
  config:
    prefundMinBalance: 2501000000000000000000 # ensure 2501 ETH
    walletAddressResultVar: "depositorAddress"
    walletPrivateKeyResultVar: "depositorPrivateKey"
  configVars:
    privateKey: "walletPrivkey"

# generate deposits & wait for activation
- name: run_tasks
  title: "Generate deposits & track inclusion"
  config:
    stopChildOnResult: false
    tasks:
    - name: generate_deposits
      title: "Generate 2 deposits with 1000 ETH each"
      config:
        limitTotal: 2
        limitPerSlot: 1
        limitPending: 1
        depositAmount: 1000
        awaitReceipt: true
        failOnReject: true
        validatorPubkeysResultVar: "validatorPubkeys"
      configVars:
        walletPrivkey: "depositorPrivateKey"
        mnemonic: "validatorMnemonic"
        depositContract: "depositContract"

    - name: run_task_matrix
      title: "Wait for detection of all deposited keys"
      configVars:
        matrixValues: "validatorPubkeys"
      config:
        runConcurrent: true
        matrixVar: "validatorPubkey"
        task:
          name: check_consensus_validator_status
          title: "Wait for validator to become activated (${validatorPubkey})"
          config:
            validatorStatus:
            - pending_initialized
          configVars:
            validatorPubKey: "validatorPubkey"
