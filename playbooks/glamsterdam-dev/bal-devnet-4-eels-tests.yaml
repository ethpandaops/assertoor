cleanupTasks:
  - name: run_shell
    title: "Cleanup EELS temp dir"
    config:
      shell: bash
      envVars:
        EELS_DIR: eelsDir
      command: |
        set -e
        EELS_DIR=$(echo $EELS_DIR | jq -r)
        if [ ! -z "$EELS_DIR" ] && [ -d "$EELS_DIR" ]; then
          rm -rf $EELS_DIR
          echo "Cleaned up ${EELS_DIR}"
        fi
