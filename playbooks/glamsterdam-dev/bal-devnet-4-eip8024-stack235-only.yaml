id: bal-devnet-4-eip8024-stack235-only
name: "bal-devnet-4: Run EELS EIP-8024 swapn_stack_235 only (debug repro)"
timeout: 1h
config:
  walletPrivkey: ""
  walletSeed: "spectests-bal4-stack235"
  specTestsBranch: "tests-bal@v5.7.0"
tasks:
  - name: run_shell
    title: "Install Python and build dependencies"
    id: deps
    timeout: 10m
    config:
      shell: bash
      command: |
        set -e
        export DEBIAN_FRONTEND=noninteractive
        sudo dpkg --add-architecture amd64 < /dev/null
        sudo apt-get update < /dev/null
        sudo apt-get install -y build-essential python3 python3-pip python3-dev libc6:amd64 autoconf automake libffi-dev libtool pkg-config < /dev/null
        sudo rm /usr/lib/python3*/EXTERNALLY-MANAGED 2>/dev/null || true
        pip install uv

  - name: run_shell
    title: "Clone EELS (execution-specs)"
    id: setup
    timeout: 10m
    config:
      shell: bash
      shellArgs: [--login]
      envVars:
        GIT_BRANCH: specTestsBranch
      command: |
        set -e
        GIT_BRANCH=$(echo $GIT_BRANCH | jq -r)

        EELS_DIR=$(mktemp -d -t eels-bal4-XXXXXXXXXX)
        echo "::set-var eelsDir ${EELS_DIR}"
        echo "${EELS_DIR}" > $ASSERTOOR_SUMMARY

        git clone https://github.com/ethereum/execution-specs.git \
          --depth 1 --branch ${GIT_BRANCH} --single-branch ${EELS_DIR}

        cd ${EELS_DIR}
        export PATH=$PATH:$HOME/.local/bin
        export HOME=${EELS_DIR}
        uv sync --all-extras

        echo "EELS environment ready at ${EELS_DIR}"

  - name: check_clients_are_healthy
    title: "Check if at least one client is ready"
    id: clientCheck
    timeout: 5m
    config:
      minClientCount: 1

  - name: get_consensus_specs
    id: consensusSpecs
    title: "Get consensus chain specs"

  - name: check_consensus_slot_range
    title: "Wait for Gloas activation"
    timeout: 1h
    configVars:
      minEpochNumber: "tasks.consensusSpecs.outputs.specs.GLOAS_FORK_EPOCH"

  - name: generate_child_wallet
    id: walletEip8024
    title: "Generate fresh wallet for EIP-8024"
    config:
      prefundMinBalance: 1000000000000000000000000 # 1M ETH
      walletSeed: "spectests-bal4-eip8024-stack235"
    configVars:
      privateKey: "walletPrivkey"

  - name: run_shell
    title: "EIP-8024: swapn_stack_235 only"
    id: eip8024_stack235
    timeout: 30m
    config:
      shell: bash
      shellArgs: [--login]
      envVars:
        EELS_DIR: eelsDir
        CHAIN_ID: tasks.consensusSpecs.outputs.specs.DEPOSIT_CHAIN_ID
        RPC_ENDPOINT: tasks.clientCheck.outputs.goodClients[0].elRpcUrl
        PRIVATE_KEY: tasks.walletEip8024.outputs.childWallet.privkey
      command: |
        set -e
        EELS_DIR=$(echo $EELS_DIR | jq -r)
        CHAIN_ID=$(echo $CHAIN_ID | jq -r)
        RPC_ENDPOINT=$(echo $RPC_ENDPOINT | jq -r)
        PRIVATE_KEY=$(echo $PRIVATE_KEY | jq -r)

        cd ${EELS_DIR}
        export PATH=$PATH:$HOME/.local/bin
        export HOME=${EELS_DIR}

        uv run execute remote ./tests/amsterdam/eip8024_dupn_swapn_exchange/test_swapn.py \
          -k "test_swapn_basic and swapn_stack_235" \
          --fork=Amsterdam \
          --chain-id=${CHAIN_ID} \
          --rpc-endpoint=${RPC_ENDPOINT} \
          --rpc-seed-key=${PRIVATE_KEY} \
          --seed-account-sweep-amount="100 ether" \
          --sender-fund-refund-gas-limit=200000 \
          --json-report --json-report-file=${ASSERTOOR_RESULT_DIR}/eip8024_stack235.json \
          --html=${ASSERTOOR_RESULT_DIR}/eip8024_stack235.html \
          -v \
          || true

        TOTAL=$(jq '.tests | length' ${ASSERTOOR_RESULT_DIR}/eip8024_stack235.json)
        PASSED=$(jq '[.tests[] | select(.outcome == "passed")] | length' ${ASSERTOOR_RESULT_DIR}/eip8024_stack235.json)
        echo "EIP-8024 swapn_stack_235: ${PASSED}/${TOTAL}"
        echo "::set-output passed ${PASSED}"
        echo "::set-output total ${TOTAL}"

        if [ "${PASSED}" != "${TOTAL}" ]; then
          jq '.tests[] | select(.outcome != "passed")' ${ASSERTOOR_RESULT_DIR}/eip8024_stack235.json
          exit 1
        fi
