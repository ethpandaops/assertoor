##
## ------------------------------------------------------------------
## SSE events (rows 12-16) -- run them all concurrently to share the
## same wait window.
## ------------------------------------------------------------------
##
- name: run_tasks_concurrent
  title: "GLOAS SSE event checks"
  config:
    tasks:
    - name: check_consensus_api
      id: row12_sse_execution_payload_bid
      title: "12. SSE execution_payload_bid"
      config:
        checkId: "sse_execution_payload_bid"
        checkTitle: "SSE execution_payload_bid"
        referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552, https://github.com/ethereum/beacon-APIs/pull/587"
        sse:
          topic: "execution_payload_bid"
          timeoutSeconds: 48
          minEvents: 1
        overallTimeout: "60s"
        eventSchema:
          type: object
          required: [version, data]

    - name: check_consensus_api
      id: row13_sse_execution_payload_available
      title: "13. SSE execution_payload_available"
      config:
        checkId: "sse_execution_payload_available"
        checkTitle: "SSE execution_payload_available"
        referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552"
        sse:
          topic: "execution_payload_available"
          timeoutSeconds: 48
          minEvents: 1
        overallTimeout: "60s"
        eventSchema:
          type: object

    - name: check_consensus_api
      id: row14_sse_payload_attestation_message
      title: "14. SSE payload_attestation_message"
      config:
        checkId: "sse_payload_attestation_message"
        checkTitle: "SSE payload_attestation_message"
        referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552"
        sse:
          topic: "payload_attestation_message"
          timeoutSeconds: 48
          minEvents: 1
        overallTimeout: "60s"
        eventSchema:
          type: object
          required: [message, signature]

    - name: check_consensus_api
      id: row15_sse_execution_payload
      title: "15. SSE execution_payload"
      config:
        checkId: "sse_execution_payload"
        checkTitle: "SSE execution_payload"
        referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/588"
        sse:
          topic: "execution_payload"
          timeoutSeconds: 48
          minEvents: 1
        overallTimeout: "60s"
        eventSchema:
          type: object

    - name: check_consensus_api
      id: row16_sse_execution_payload_gossip
      title: "16. SSE execution_payload_gossip"
      config:
        checkId: "sse_execution_payload_gossip"
        checkTitle: "SSE execution_payload_gossip"
        referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/588"
        sse:
          topic: "execution_payload_gossip"
          timeoutSeconds: 48
          minEvents: 1
        overallTimeout: "60s"
        eventSchema:
          type: object

##
## ------------------------------------------------------------------
## Final aggregator
## ------------------------------------------------------------------
##
- name: generate_api_compatibility_matrix
  id: matrix
  title: "Render GLOAS API compatibility matrix"
  config:
    title: "GLOAS Beacon-API Compatibility Matrix"
    description: |
      Compatibility matrix for all beacon-API endpoints and SSE topics
      introduced or changed by GLOAS (ePBS). Each cell records the
      outcome of probing the endpoint against a single CL client
      implementation. See the legend below the table for cell meanings;
      cells with notes are footnoted by number.
    includeCheckIds:
      - publish_block
      - produce_block_v4
      - publish_bid
      - get_bid
      - publish_envelope
      - get_envelope_by_block
      - get_envelope_by_slot
      - ptc_duties
      - payload_attestation_data
      - post_payload_attestations
      - get_payload_attestations
      - sse_execution_payload_bid
      - sse_execution_payload_available
      - sse_payload_attestation_message
      - sse_execution_payload
      - sse_execution_payload_gossip
    includeFootnotes: true
    includeLegend: true
