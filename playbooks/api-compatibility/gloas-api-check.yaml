##
## ------------------------------------------------------------------
## Final matrix renderer
##
## Walks every check_consensus_api task's outputs and renders a
## markdown matrix table into matrix.md (downloadable + rendered
## inline by the UI's markdown handler).
## ------------------------------------------------------------------
##
- name: run_javascript
  id: matrix
  title: "Render GLOAS API compatibility matrix"
  config:
    envVars:
      # One env var per row. Each query is a simple path expression so it
      # never enumerates the scope wholesale — that avoids gojq panicking
      # on time.Time values nested elsewhere in the var tree (e.g. inside
      # get_consensus_specs's spec map).
      ROW_01: "tasks.row01_publish_block.outputs"
      ROW_02: "tasks.row02_produce_block_v4.outputs"
      ROW_03: "tasks.row03_publish_bid.outputs"
      ROW_04: "tasks.row04_get_bid.outputs"
      ROW_05: "tasks.row05_publish_envelope.outputs"
      ROW_06: "tasks.row06_get_envelope_by_block.outputs"
      ROW_07: "tasks.row07_get_envelope_by_slot.outputs"
      ROW_08: "tasks.row08_ptc_duties.outputs"
      ROW_09: "tasks.row09_payload_attestation_data.outputs"
      ROW_10: "tasks.row10_post_payload_attestations.outputs"
      ROW_11: "tasks.row11_get_payload_attestations.outputs"
      ROW_12: "tasks.row12_sse_execution_payload_bid.outputs"
      ROW_13: "tasks.row13_sse_execution_payload_available.outputs"
      ROW_14: "tasks.row14_sse_payload_attestation_message.outputs"
      ROW_15: "tasks.row15_sse_execution_payload.outputs"
      ROW_16: "tasks.row16_sse_execution_payload_gossip.outputs"
    script: |
      // Canonical client-type column order. Columns absent from results
      // are dropped automatically.
      const ORDER = ['lighthouse','teku','prysm','grandine','nimbus','lodestar','caplin'];
      const ROW_ORDER = [
        'publish_block','produce_block_v4','publish_bid','get_bid',
        'publish_envelope','get_envelope_by_block','get_envelope_by_slot',
        'ptc_duties','payload_attestation_data',
        'post_payload_attestations','get_payload_attestations',
        'sse_execution_payload_bid','sse_execution_payload_available',
        'sse_payload_attestation_message','sse_execution_payload',
        'sse_execution_payload_gossip',
      ];

      const SHORT = { lighthouse:'LH', teku:'Tk', prysm:'Pr', grandine:'Gr', nimbus:'Ni', lodestar:'Lo', caplin:'Ca' };
      const EMOJI = { pass:'✅', partial:'🟡', fail:'❌', skipped:'⚪' };
      const SUP   = ['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'];

      const short  = t => SHORT[t] || ((t[0] || '?').toUpperCase() + (t[1] || ''));
      const emoji  = r => EMOJI[r] || '—';
      const sup    = n => String(n).split('').map(d => SUP[+d]).join('');

      const fmtTitle = t => {
        if (t.startsWith('SSE ')) return 'SSE `' + t.slice(4) + '`';
        const m = t.match(/^(GET|POST|PUT|DELETE|PATCH) (.*)$/);
        if (!m) return '`' + t + '`';
        const sp = m[2].indexOf(' (');
        if (sp < 0) return '`' + t + '`';
        return '`' + m[1] + ' ' + m[2].slice(0, sp) + '`' + m[2].slice(sp);
      };

      // 1) collect & order rows. envVars are provided as ROW_01..ROW_16,
      //    each pointing at one source task's outputs object.
      const allRows = Object.keys(env)
        .filter(k => /^ROW_\d+$/.test(k))
        .sort()
        .map(k => env[k])
        .filter(o => o && typeof o === 'object' && o.matrixRow && o.rowId);

      const idxOf = Object.fromEntries(ROW_ORDER.map((id, i) => [id, i]));
      const rows = allRows
        .filter(r => ROW_ORDER.length === 0 || idxOf[r.rowId] !== undefined)
        .sort((a, b) => (idxOf[a.rowId] ?? 1e9) - (idxOf[b.rowId] ?? 1e9));

      // 2) determine used columns.
      const used = new Set();
      rows.forEach(r => Object.keys(r.matrixRow || {}).forEach(c => used.add(c)));
      const cols = ORDER.filter(c => used.has(c)).concat([...used].filter(c => !ORDER.includes(c)));

      // 3) collect footnotes (unique notes).
      const footnotes = [];
      const fnMap = new Map();
      for (const r of rows) {
        for (const [, cell] of Object.entries(r.matrixRow || {})) {
          if ((cell.result === 'partial' || cell.result === 'fail') && cell.note) {
            if (!fnMap.has(cell.note)) {
              footnotes.push(cell.note);
              fnMap.set(cell.note, footnotes.length);
            }
          }
        }
      }

      // 4) render markdown.
      const counts = { pass: 0, partial: 0, fail: 0, skipped: 0, absent: 0 };
      const lines = [
        '# GLOAS Beacon-API Compatibility Matrix',
        '',
        'Compatibility matrix for all beacon-API endpoints and SSE topics introduced or changed by GLOAS (ePBS). Each cell records the outcome of probing the endpoint against a single CL client implementation. See the legend below the table for cell meanings; cells with notes are footnoted by number.',
        '',
        '| # | Endpoint / Event | ' + cols.map(short).join(' | ') + ' |',
        '|---|---|' + cols.map(() => '---').join('|') + '|',
      ];

      rows.forEach((r, i) => {
        const cells = cols.map(c => {
          const cell = r.matrixRow?.[c];
          if (!cell || !cell.result) { counts.absent++; return '—'; }
          counts[cell.result] = (counts[cell.result] || 0) + 1;
          const e = emoji(cell.result);
          if ((cell.result === 'partial' || cell.result === 'fail') && cell.note) {
            return e + sup(fnMap.get(cell.note));
          }
          return e;
        });
        lines.push('| ' + (i + 1) + ' | ' + fmtTitle(r.rowTitle || r.rowId) + ' | ' + cells.join(' | ') + ' |');
      });

      if (footnotes.length) {
        lines.push('');
        footnotes.forEach((note, i) => lines.push((i + 1) + '. ' + note));
      }
      lines.push('', '**Legend:** ✅ pass · 🟡 partial · ❌ fail · ⚪ skipped · — absent');

      const markdown = lines.join('\n') + '\n';

      // Write to both: the run-level Result panel (centrally visible on
      // the run page) AND a downloadable matrix.md task artifact.
      writeTestResult(markdown);
      writeResultFile('matrix.md', markdown);
