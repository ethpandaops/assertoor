# Row 8 -- POST /eth/v1/validator/duties/ptc/{epoch}
- name: check_consensus_api
  id: row08_ptc_duties
  title: "8. POST /eth/v1/validator/duties/ptc/{epoch}"
  config:
    checkId: "ptc_duties"
    checkTitle: "POST /eth/v1/validator/duties/ptc/{epoch}"
    referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552, https://github.com/ethereum/beacon-APIs/pull/592"
    method: "POST"
    path: "/eth/v1/validator/duties/ptc/{epoch}"
    body: ["0", "1", "2", "3", "4"]
    expectStatuses:  [200, 400, 404, 503]
    successStatuses: [200]
    errorStatuses:   [400, 404, 503]
    requestTimeout: "20s"
    responseSchema:
      type: object
      required: [dependent_root, execution_optimistic, data]
      properties:
        dependent_root:       { type: string }
        execution_optimistic: { type: boolean }
        data:                 { type: array }
    errorSchema:
      type: object
      required: [code, message]

