# Row 7 -- GET /eth/v1/validator/execution_payload_envelope/{slot}/{beacon_block_root}
- name: check_consensus_api
  id: row07_get_envelope_by_slot
  title: "7. GET /eth/v1/validator/execution_payload_envelope/{slot}/{beacon_block_root}"
  config:
