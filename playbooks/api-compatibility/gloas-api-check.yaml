    checkTitle: "GET /eth/v1/beacon/pool/payload_attestations"
    referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552"
    method: "GET"
    path: "/eth/v1/beacon/pool/payload_attestations"
