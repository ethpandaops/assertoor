- name: check_consensus_api
  id: row09_payload_attestation_data
  title: "9. GET /eth/v1/validator/payload_attestation_data/{slot}"
  config:
    checkId: "payload_attestation_data"
    checkTitle: "GET /eth/v1/validator/payload_attestation_data/{slot}"
    referenceUrl: "https://github.com/ethereum/beacon-APIs/pull/552"
