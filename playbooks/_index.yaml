      3. Pre-exitability slashings (attester + proposer).
      4. SHARD_COMMITTEE_PERIOD wait.
      5. Voluntary exits + EL-triggered exits (EIP-7002).
      6. Post-exit slashings.
      7. Final BLS changes + full-withdrawal verification.

      Long-running (672h timeout) — use on a long-lived pectra devnet.
