  - file: stable/kurtosis/validator-withdrawal-test.yaml
    id: validator-withdrawal-test
    name: Validator BLS Change & Withdrawal Test (Kurtosis)
    description: |-
      Verifies BLS-to-execution credential changes (0x00 → 0x01) propagate
      and trigger withdrawals across all client pairs.

      Phases:

      1. **BLS-change broadcast** — emits 50 BLS changes (1/slot) for genesis
         validators and asserts every `validatorPairName` proposes a block
         containing one.
      2. **Force-feed** — sends 50 more BLS changes for the first 50 keys to
         guarantee they have a 0x01 withdrawal address.
      3. **Per-client BLS-change RPC** — for each `clientPairName`, submits
         50 BLS changes via that client and verifies inclusion.
      4. **Withdrawal observation** — asserts every `validatorPairName`
         proposes at least one block with a withdrawal.

      Requires the standard kurtosis genesis mnemonic and a known target
      address; does not work on networks without those validators.
    version: 1.0.0
    tags:
      - withdrawal
      - bls-change
      - kurtosis
      - consistency
      - consensus
    timeout: 1h
  - file: stable/mev-block-proposal-check.yaml
    id: mev-block-proposal-check
    name: Every client pair proposed an MEV-built block
    description: |-
      Verifies that every configured `validatorPairNames` entry has proposed at
      least one block whose `extra_data` matches `mevExtraDataPattern` (default
      "hello world"). This pattern is typically set by a mock MEV-boost relay.

      Use this to confirm builder-API integration is working end-to-end for every
      CL client and validator pair.
    version: 1.0.0
    tags:
      - health-check
      - mev
      - consensus
    timeout: 20m
  - file: stable/stability-check.yaml
    id: stability-check
    name: Check chain stability
    description: |-
      Long-running chain health check. Verifies that:

      - all configured EL & CL clients are synced
      - the chain finalizes (at least 2 finalized epochs, never more than 3 unfinalized)
      - attestation participation is high (>= 98% target, >= 80% head)
      - no excessive reorgs (<= 2 per epoch) or forks

      Run this as a smoke test on a fresh devnet or as a sanity baseline before
      more disruptive playbooks. Fails fast if the chain is unhealthy.
    version: 1.0.0
    tags:
      - stability
      - health-check
      - consensus
      - execution
    timeout: 2h
  - file: stable/validator-lifecycle-test-v2.yaml
    id: validator-lifecycle-test-v2
    name: Validator Lifecycle Test (v2)
    description: |-
      Full end-to-end validator lifecycle on a chain with the Electra fork
      active (or pre-Electra with legacy eth1 deposits). Creates 10 fresh
      validators from a random mnemonic and walks them through:

      1. **Deposits** — 10 new validators + 2 double-deposits (keys 0 and 5).
         Accepts both legacy eth1-voting deposits and EIP-6110 deposit requests.
      2. **Activation** — waits for all keys to reach `active_ongoing`.
      3. **BLS changes** (first half) — converts keys 0–4 to 0x01 withdrawal
         credentials and verifies a partial withdrawal for key 0.
      4. **Pre-exit slashings** — attester slash key 2, proposer slash key 7.
      5. **Exitability wait** — sleeps `SHARD_COMMITTEE_PERIOD` epochs.
      6. **Voluntary exits** — exits keys 0, 1, 4, 5, 8, 9 and verifies
         post-exit full withdrawals for the 0x01-credentialed keys.
      7. **Post-exit slashings** — attester slash key 3, proposer slash key 6.
      8. **BLS changes** (second half) — keys 5–9 to 0x01, verifies full
         withdrawals for keys 5, 8, 9.

      Cleanup task ensures all 10 keys are exited regardless of outcome.

      This is the production-ready successor to the older `dev/validator-lifecycle-test.yaml`.
    version: 2.0.0
    tags:
      - lifecycle
      - deposit
      - withdrawal
      - exit
      - slashing
      - bls-change
      - eip-6110
    timeout: 672h
  - file: verkle-dev/aave-deployment.yaml
    id: deploy-aave
    name: Deploy AAVE v3.1 (Verkle)
    description: |-
      Installs Foundry + solc 0.8.19 inside the assertoor container, clones
      the AAVE v3.1 verkle branch, and deploys the full protocol stack via
      `forge script` against a fresh child wallet.

      Used to verify a verkle-converted EL still executes a large real-world
      application bundle end-to-end. Heavyweight — installs toolchain and
      pulls a multi-MB repo on each run.
    version: 1.0.0
    tags:
      - verkle
      - aave
      - deployment
      - transaction
    timeout: 1h
  - file: verkle-dev/verkle-conversion-check.yaml
    id: verkle-conversion-check
    name: Verify verkle state-conversion progress
    description: |-
      Tracks the verkle state-conversion process across all EL clients.

      Concurrently runs:

      - `check_clients_are_healthy` so we notice if a client dies mid-way.
      - A matrix over EL clients calling `check_execution_conversion_state`,
        which polls the verkle-conversion RPC until every client reports
        completion.

      Long timeout — conversion can take many hours on a populated chain.
    version: 1.0.0
    tags:
      - verkle
      - execution
      - health-check
      - stability
    timeout: 12h
