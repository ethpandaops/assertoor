    name: Validator Lifecycle Test (v3, Pectra)
    description: |-
      Pectra-aware end-to-end validator lifecycle, building on v2 with
      EIP-7251 consolidations and EIP-7002 EL-triggered operations.

      Sweeps 10 fresh validators with mixed withdrawal credentials
      (0x00 / 0x01 / 0x02) through:

      1. Deposits (mix of legacy & EIP-6110), activation wait.
      2. BLS changes → consolidations (EIP-7251), including overflow at
