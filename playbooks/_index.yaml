      (default 1000) transactions each carrying `calldataSize` zero bytes of
      calldata (default 1000) at `transactionsPerBlock` throughput, then
      verifies the chain stayed healthy:

      - finality continues (>= 2 finalized, <= 3 unfinalized epochs)
      - attestation participation stays high
      - no excessive reorgs or forks

      Use to gauge EL/CL behavior under sustained large-payload load.
    version: 1.0.0
    tags:
      - transaction
      - calldata
      - spam
      - stability
    timeout: 30m
  - file: stable/blob-transactions-test.yaml
    id: blob-transactions-test
    name: Blob Transaction Test
    description: |-
      Generates EIP-4844 blob transactions and verifies they propagate through
      every EL/CL client pair. Two phases:

      1. Send blob transactions while all clients propose blocks, asserting
         every `validatorPairName` includes >= 1 blob in a proposed block.
      2. Send blob transactions targeted at each `clientPairName` to verify
         per-client RPC ingest and gossip.

      Each transaction carries 1 blob sidecar; 2 blob tx per block target.
    version: 1.0.0
    tags:
      - blob
      - transaction
      - eip-4844
      - dencun
      - consistency
      - consensus
    timeout: 30m
  - file: stable/block-proposal-check.yaml
    id: block-proposal-check
    name: Every client pair proposed a block
    description: |-
      Verifies that every configured `validatorPairNames` entry has proposed at
      least one block. Uses a task matrix to run one wait-for-proposal check per
      client pair concurrently.

      Useful as a network-wide liveness check after starting a multi-client
      devnet to confirm all proposer duties are firing.
    version: 1.0.0
    tags:
      - health-check
      - consensus
    timeout: 20m
  - file: stable/dencun-opcodes-test.yaml
    id: dencun-opcodes-test
    name: Dencun Opcodes Test
    description: |-
      Exercises every new opcode/precompile introduced by the Dencun (Deneb +
      Cancun) fork. Deploys one test contract per EIP and calls it with
      verifying log events:

      - **EIP-1153** — Transient storage (`TSTORE` / `TLOAD`) across calls and
        across transactions in the same block.
      - **EIP-4844** — `BLOBHASH` opcode and `BLOBBASEFEE` (EIP-7516) with 3
        blob sidecars attached.
      - **EIP-5656** — `MCOPY` memory copy instruction.
      - **EIP-4788** — Beacon block root precompile, called via a stored
        address in the parent contract.

      Closes with a reorg/fork sanity check.
    version: 1.0.0
    tags:
      - dencun
      - opcodes
      - eip-1153
      - eip-4844
      - eip-5656
      - eip-4788
      - eip-7516
    timeout: 1h
  - file: stable/eoa-transactions-test.yaml
    id: eoa-transactions-test
    name: EOA Transaction Test
    description: |-
      Generates EOA transactions and verifies they propagate through every
      EL/CL client pair. Covers both transaction types:

      - **Legacy** (pre-EIP-1559)
      - **Dynamic-fee** (EIP-1559)

      For each type the test runs two phases:

      1. Send transactions while all clients propose blocks, asserting every
         `validatorPairName` produces a block with >= 5 transactions.
      2. Send the same transactions targeted at each `clientPairName` in turn
         to verify per-client RPC ingest.

      Use to validate basic EL transaction handling and CL inclusion paths.
    version: 1.0.0
    tags:
      - transaction
      - consistency
      - consensus
      - execution
    timeout: 30m
  - file: stable/kurtosis/validator-exit-test.yaml
    id: validator-exit-test
    name: Validator Voluntary Exit Test (Kurtosis)
    description: |-
      Tests voluntary-exit generation, gossip and inclusion across all client
      pairs.

      1. Generates 50 voluntary exits (1/slot) and asserts every
         `validatorPairName` proposes a block containing one.
      2. For each `clientPairName`, generates 50 voluntary exits via that
         client and asserts inclusion.

      Requires the standard kurtosis genesis mnemonic. Different index ranges
      are used per phase to avoid hitting already-exited validators.
    version: 1.0.0
    tags:
      - exit
      - voluntary
      - kurtosis
      - consistency
      - consensus
    timeout: 1h
  - file: stable/kurtosis/validator-slashing-test.yaml
    id: validator-slashing-test
    name: Validator Slashing Test (Kurtosis)
    description: |-
      Tests attester and proposer slashing generation, gossip and inclusion
      across all client pairs.

      Two halves (attester, then proposer); each half:

      1. Generates 50 slashings (1/slot) and asserts every `validatorPairName`
         proposes a block containing one.
      2. For each `clientPairName`, generates 50 slashings via that client
         and asserts inclusion.

      Slashings target distinct validator-index ranges per phase to avoid
      reusing already-slashed validators. Requires the standard kurtosis
      genesis mnemonic.
    version: 1.0.0
    tags:
      - slashing
      - kurtosis
      - consistency
      - consensus
    timeout: 1h
  - file: stable/kurtosis/validator-withdrawal-test.yaml
    id: validator-withdrawal-test
    name: Validator BLS Change & Withdrawal Test (Kurtosis)
    description: |-
      Verifies BLS-to-execution credential changes (0x00 → 0x01) propagate
      and trigger withdrawals across all client pairs.

      Phases:

      1. **BLS-change broadcast** — emits 50 BLS changes (1/slot) for genesis
         validators and asserts every `validatorPairName` proposes a block
         containing one.
      2. **Force-feed** — sends 50 more BLS changes for the first 50 keys to
         guarantee they have a 0x01 withdrawal address.
      3. **Per-client BLS-change RPC** — for each `clientPairName`, submits
         50 BLS changes via that client and verifies inclusion.
      4. **Withdrawal observation** — asserts every `validatorPairName`
         proposes at least one block with a withdrawal.

      Requires the standard kurtosis genesis mnemonic and a known target
      address; does not work on networks without those validators.
    version: 1.0.0
    tags:
      - withdrawal
      - bls-change
      - kurtosis
      - consistency
      - consensus
    timeout: 1h
  - file: stable/mev-block-proposal-check.yaml
    id: mev-block-proposal-check
    name: Every client pair proposed an MEV-built block
    description: |-
      Verifies that every configured `validatorPairNames` entry has proposed at
      least one block whose `extra_data` matches `mevExtraDataPattern` (default
      "hello world"). This pattern is typically set by a mock MEV-boost relay.

      Use this to confirm builder-API integration is working end-to-end for every
      CL client and validator pair.
    version: 1.0.0
    tags:
      - health-check
      - mev
      - consensus
    timeout: 20m
  - file: stable/stability-check.yaml
    id: stability-check
    name: Check chain stability
    description: |-
      Long-running chain health check. Verifies that:

      - all configured EL & CL clients are synced
      - the chain finalizes (at least 2 finalized epochs, never more than 3 unfinalized)
      - attestation participation is high (>= 98% target, >= 80% head)
      - no excessive reorgs (<= 2 per epoch) or forks

      Run this as a smoke test on a fresh devnet or as a sanity baseline before
      more disruptive playbooks. Fails fast if the chain is unhealthy.
    version: 1.0.0
    tags:
      - stability
      - health-check
      - consensus
      - execution
    timeout: 2h
  - file: stable/validator-lifecycle-test-v2.yaml
    id: validator-lifecycle-test-v2
    name: Validator Lifecycle Test (v2)
    description: |-
      Full end-to-end validator lifecycle on a chain with the Electra fork
      active (or pre-Electra with legacy eth1 deposits). Creates 10 fresh
      validators from a random mnemonic and walks them through:

      1. **Deposits** — 10 new validators + 2 double-deposits (keys 0 and 5).
         Accepts both legacy eth1-voting deposits and EIP-6110 deposit requests.
      2. **Activation** — waits for all keys to reach `active_ongoing`.
      3. **BLS changes** (first half) — converts keys 0–4 to 0x01 withdrawal
         credentials and verifies a partial withdrawal for key 0.
      4. **Pre-exit slashings** — attester slash key 2, proposer slash key 7.
      5. **Exitability wait** — sleeps `SHARD_COMMITTEE_PERIOD` epochs.
      6. **Voluntary exits** — exits keys 0, 1, 4, 5, 8, 9 and verifies
         post-exit full withdrawals for the 0x01-credentialed keys.
      7. **Post-exit slashings** — attester slash key 3, proposer slash key 6.
      8. **BLS changes** (second half) — keys 5–9 to 0x01, verifies full
         withdrawals for keys 5, 8, 9.

      Cleanup task ensures all 10 keys are exited regardless of outcome.

      This is the production-ready successor to the older `dev/validator-lifecycle-test.yaml`.
    version: 2.0.0
    tags:
      - lifecycle
      - deposit
      - withdrawal
      - exit
      - slashing
      - bls-change
      - eip-6110
    timeout: 672h
  - file: verkle-dev/aave-deployment.yaml
