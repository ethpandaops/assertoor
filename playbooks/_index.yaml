      applies slashings before voluntary exits, so honest proposers must
      pre-validate operations and drop the now-invalid voluntary exit.

      For each of `validatorCount` validators concurrently:

      1. Submit a slashing (attester by default; configurable via
         `slashingType`).
      2. Immediately submit a voluntary exit for the same validator while
         it still looks active in head state.
      3. Wait for the slashing to land in a CL block (slot S).
      4. Wait 10 slots after submission, then scan the last 10 blocks for
