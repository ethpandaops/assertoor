      (default 1000) transactions each carrying `calldataSize` zero bytes of
      calldata (default 1000) at `transactionsPerBlock` throughput, then
      verifies the chain stayed healthy:

      - finality continues (>= 2 finalized, <= 3 unfinalized epochs)
      - attestation participation stays high
      - no excessive reorgs or forks

      Use to gauge EL/CL behavior under sustained large-payload load.
