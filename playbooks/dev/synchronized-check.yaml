id: synchronized-check
name: "Check client pairs are in sync"
description: |
  For every `clientPairName`, concurrently checks that both its CL and
  EL clients are synchronized (not stuck, not syncing). Long-running
  (12h timeout) — re-checks continuously until cancelled or all clients
  remain in sync.

  Useful as a background test on a live devnet to catch nodes that fall
  behind.
version: 1.0.0
tags: [health-check, stability, consensus, execution]
timeout: 12h
config:
  clientPairNames: []
tasks:
- name: run_task_matrix
  title: "Check if client pairs are synchronized"
  configVars:
    matrixValues: "clientPairNames"
  config:
    runConcurrent: true
    failTaskCount: 1
    matrixVar: "checkClient"
    task:
      name: run_tasks_concurrent
      title: "Check if ${checkClient} is synchronized"
      config:
        tasks:
        - name: check_consensus_sync_status
          title: "Check if CL client is synced"
          configVars:
            clientPattern: "checkClient"
        - name: check_execution_sync_status
          title: "Check if EL client is synced"
          configVars:
            clientPattern: "checkClient"
