id: execution-spec-tests-dependencies
name: "Install execution-spec-tests dependencies"
description: |
  Helper playbook that `apt-get install`s build tools (gcc, python3,
  pip, autotools, libffi, libtool) needed to run
  [execution-spec-tests](https://github.com/ethereum/execution-spec-tests)
  inside an assertoor container.

  Run once before invoking the execute/spec-tests playbooks. Requires
  the container to allow sudo. Not a network test on its own.
version: 1.0.0
tags: [execution-spec-tests, utility]
timeout: 1h
tasks:
  - name: run_shell
    title: Install dependencies
    config:
      shell: bash
      command: |
        sudo dpkg --add-architecture amd64
        sudo apt-get update
        sudo apt-get install -y build-essential python3 python3-pip python3-dev libc6:amd64 autoconf automake libffi-dev libtool pkg-config
        sudo rm /usr/lib/python3*/EXTERNALLY-MANAGED 2>/dev/null || true
