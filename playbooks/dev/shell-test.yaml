id: shell-test
name: "Shell task smoke test"
description: |
  Trivial smoke test that writes `Hello` to `$ASSERTOOR_SUMMARY` via the
  `run_shell` task. Useful only as a sanity check that shell tasks work
  on the assertoor instance — not a real network test.
version: 0.1.0
tags: [utility]
timeout: 4h
config:
  #walletPrivkey: ""
tasks:
  - name: run_shell
    title: "Create temp dir for execution spec tests"
    id: tempdir
    config:
      shell: bash
      command: |
        set -e

        echo "Hello" > $ASSERTOOR_SUMMARY
  