id: block-proposal-with-blobs-check
name: "Every client pair proposed a block with blobs"
description: |
  Verifies that every configured `validatorPairName` proposes at least
  one block carrying `minBlobCount` blobs (default 3).

  Pair this with a blob-spam source running in parallel to confirm
  blob propagation end-to-end across all clients.
version: 1.0.0
tags: [health-check, blob, eip-4844, consensus]
timeout: 20m
disable: false
config:
  validatorPairNames: []
  minBlobCount: 3
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1

- name: run_task_matrix
  title: "Check block proposals from all client pairs with >= ${minBlobCount} blobs"
  configVars:
    matrixValues: "validatorPairNames"
  config:
    runConcurrent: true
    matrixVar: "validatorPairName"
    task:
      name: check_consensus_block_proposals
      title: "Wait for block proposal from ${validatorPairName}"
      configVars:
        validatorNamePattern: "validatorPairName"
        minBlobCount: "minBlobCount"
