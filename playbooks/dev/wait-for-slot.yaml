id: wait-for-slot
name: "Wait for specific slot"
description: |
  Utility playbook that blocks until the chain reaches `slot`.

  Useful as a building block in larger orchestrations or as a quick way
  to delay other tests until the chain is far enough along.
version: 1.0.0
tags: [utility]
timeout: 2h
config:
  slot: 34

tasks:
- name: check_consensus_slot_range
  title: "Wait for slot >= ${slot}"
  timeout: 2h
  configVars:
    minSlotNumber: "slot"