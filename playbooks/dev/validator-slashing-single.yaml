id: validator-slashing-single
name: "Slash a single validator"
description: |
  Generates a single proposer slashing for `validatorIndex`
  (default 0). Waits to epoch >= 4 before submitting.

  Tiny utility playbook — handy when you want one validator slashed
  on a kurtosis devnet without running the full slashing suite. Uses
  the hardcoded kurtosis mnemonic.
version: 1.0.0
tags: [slashing, kurtosis, utility, consensus]
timeout: 1h
config:
  validatorMnemonic: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"
  validatorIndex: 0
  validatorCount: 1
tasks:
- name: check_clients_are_healthy
  title: "Check if at least one client is ready"
  timeout: 5m
  config:
    minClientCount: 1
- name: check_consensus_slot_range
  title: "Wait for epoch >= 4"
  timeout: 1h  # 4 epochs = ~0.5h
  config:
    minEpochNumber: 4

- name: generate_slashings
  title: "Generate 1 proposer slashing per slot"
  config:
    slashingType: "proposer"
    limitPerSlot: 1
  configVars:
    mnemonic: "validatorMnemonic"
    startIndex: "validatorIndex"
    limitTotal: "validatorCount"
    indexCount: "validatorCount"
