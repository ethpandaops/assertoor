    type: object
  web_api.PostTestsRegisterRequest:
    properties:
      cleanupTasks:
        items:
          $ref: '#/definitions/helper.RawMessage'
        type: array
      config:
        additionalProperties: true
        type: object
      configVars:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      name:
        type: string
      schedule:
        $ref: '#/definitions/types.TestSchedule'
      tasks:
        items:
          $ref: '#/definitions/helper.RawMessage'
        type: array
      timeout:
        type: string
    type: object
  web_api.PostTestsRegisterResponse:
    properties:
      config:
        additionalProperties: {}
        type: object
      name:
        type: string
      test_id:
        type: string
    type: object
  web_api.PutTestScheduleRequest:
    properties:
      schedule:
        allOf:
        - $ref: '#/definitions/types.TestSchedule'
        description: Schedule is the new schedule. May be null to clear.
    type: object
  web_api.Response:
    properties:
      data: {}
      status:
        type: string
    type: object
  web_api.ScheduleQueueMode:
    enum:
    - immediate
    - end
    - after
    type: string
    x-enum-varnames:
    - ScheduleQueueModeImmediate
    - ScheduleQueueModeEnd
    - ScheduleQueueModeAfter
  web_api.ScheduleQueueOption:
    properties:
      after_run_id:
        description: |-
          AfterRunID is honoured only when Mode == "after". The new test
          is placed immediately after that run in the pending queue. If
          the referenced run is no longer queued the request silently
          falls back to "append to end".
        type: integer
      mode:
        $ref: '#/definitions/web_api.ScheduleQueueMode'
    type: object
info:
  contact: {}
  description: API for querying information about Assertoor tests
  title: Assertoor API Documentation
  version: "1.0"
paths:
  /api/v1/clients:
    get:
      description: Returns the list of configured consensus and execution layer clients
        with their current status.
      operationId: getClients
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetClientsResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get list of configured clients
      tags:
      - Client
  /api/v1/dashboard_config:
    get:
      description: |-
        Returns the persisted dashboard layout (JSON blob).
        Public read; mutations are auth-gated via PUT.
        Returns 204 when no config has been saved yet — the
        UI falls back to a built-in default in that case.
      operationId: getDashboardConfig
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard config JSON
          schema:
            items:
              type: integer
            type: array
        "204":
          description: No config persisted yet
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get the active dashboard config
      tags:
      - Dashboard
    put:
      consumes:
      - application/json
      description: |-
        Auth-required. Persists the supplied JSON blob as the
        active dashboard layout. The body is treated as
        opaque — the server only checks that it parses as
        valid JSON; semantic validation lives in the client.
      operationId: putDashboardConfig
      produces:
      - application/json
      responses:
        "200":
          description: Saved
          schema:
            $ref: '#/definitions/web_api.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Replace the active dashboard config
      tags:
      - Dashboard
  /api/v1/global_variables:
    get:
      description: Returns the names of all configured global variables. Values are
        not included as they may contain sensitive data.
      operationId: getGlobalVariables
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetGlobalVariablesResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get global variable names
      tags:
      - Config
  /api/v1/logs/{since}:
    get:
      description: Returns application-level logs from the coordinator. Protected
        endpoint - requires authentication unless auth is disabled.
      parameters:
      - description: Log index to start from (0 for all)
        in: path
        name: since
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetLogsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get application logs
      tags:
      - Logs
  /api/v1/network_status:
    get:
      description: |-
        Aggregated snapshot of the chain (head, finalized,
        justified, current slot/epoch) and the orchestration
        state (client readiness counts, test queue depth).
        Powers the dashboard `network_status` tile.
      operationId: getNetworkStatus
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.NetworkStatusResponse'
              type: object
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get a network-wide status snapshot
      tags:
      - Network
  /api/v1/playbook_library:
    get:
      description: |-
        Returns the index of playbooks available from the configured upstream
        (default: ethpandaops/assertoor master). The response includes the
        resolved base URL used to fetch individual playbooks and the folder
        metadata harvested from `_header.yaml` files.
        The index is cached server-side; a stale copy is served if a refresh fails.
      operationId: getPlaybookLibrary
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/playbooklibrary.IndexResponse'
              type: object
        "404":
          description: Library disabled
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get the published playbook library index
      tags:
      - PlaybookLibrary
  /api/v1/playbook_library/check:
    get:
      description: |-
        Fetches the remote YAML for the given library file and compares it
        against any locally registered test with the same id. The response
        tells the caller whether to register fresh (absent), skip registration
        and run the existing test (same), or warn before overwriting (different).
        Requires authentication because the response includes local YAML which
        may contain sensitive configuration.
      operationId: getPlaybookLibraryCheck
      parameters:
      - description: Library file path (e.g. stable/stability-check.yaml)
        in: query
        name: file
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetPlaybookLibraryCheckResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Library disabled or file not in index
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Compare a library playbook against the locally-registered copy
      tags:
      - PlaybookLibrary
  /api/v1/task_descriptor/{name}:
    get:
      description: Returns a single task descriptor by name with its JSON schema
      parameters:
      - description: Task name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/tasks.TaskDescriptorAPI'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get a specific task descriptor
      tags:
      - Task
  /api/v1/task_descriptors:
    get:
      description: Returns a list of all available task descriptors with their JSON
        schemas
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/tasks.TaskDescriptorAPI'
                  type: array
              type: object
      summary: Get all task descriptors
      tags:
      - Task
  /api/v1/test/{testId}:
    get:
      description: Returns the test definition with given ID.
      operationId: getTest
      parameters:
      - description: ID of the test definition to get details for
        in: path
        name: testId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get test definition by test ID
      tags:
      - Test
  /api/v1/test/{testId}/latest_result:
    get:
      description: |-
        Walks recent runs of the test (newest first) and returns
        the first $ASSERTOOR_TEST_RESULT markdown blob found.
        Returns 200 with metadata in headers (X-Run-Id, X-Run-Status,
        X-Run-Start-Time) and the markdown as the body.
        When ?meta=1 is set, returns a JSON envelope instead
        (handy for tile fetchers that want one round-trip).
      operationId: getTestLatestResult
      parameters:
      - description: Test ID
        in: path
        name: testId
        required: true
        type: string
      - description: Set to 1 to receive a JSON envelope
        in: query
        name: meta
        type: string
      produces:
      - text/markdown
      - application/json
      responses:
        "200":
          description: Markdown body
          schema:
            type: string
        "204":
          description: No result available across recent runs
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get the latest run-level result markdown for a test
      tags:
      - Test
  /api/v1/test/{testId}/next_run:
    get:
      description: |-
        Walks each cron expression on the test's schedule
        and returns the next firing time per expression plus
        the overall earliest one. Empty when the test has no
        cron schedule.
      operationId: getTestNextRun
      parameters:
      - description: Test ID
        in: path
        name: testId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestNextRunResponse'
              type: object
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get the next planned cron firings for a test
      tags:
      - Test
  /api/v1/test/{testId}/schedule:
    put:
      consumes:
      - application/json
      description: |-
        Auth-required. Replaces the schedule (cron + startup
        + skipQueue) for a registered test. Cron expressions
        are validated up-front; invalid input rejects the
        whole request without changing state.
      operationId: putTestSchedule
      parameters:
      - description: Test ID
        in: path
        name: testId
        required: true
        type: string
      - description: New schedule
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web_api.PutTestScheduleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Saved
          schema:
            $ref: '#/definitions/web_api.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Update a test's run schedule
      tags:
      - Test
  /api/v1/test/{testId}/yaml:
    get:
      description: Returns the full YAML source for a test definition. For API-registered
        tests, returns the stored YAML. For external tests referenced by file/URL,
        loads and returns the content from the original source. Requires authentication
        as YAML may contain sensitive configuration.
      operationId: getTestYaml
      parameters:
      - description: ID of the test definition to get YAML for
        in: path
        name: testId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestYamlResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get test YAML source by test ID
      tags:
      - Test
  /api/v1/test_queue:
    get:
      description: |-
        Returns the pending test queue in execution order
        plus any currently running tests at the head. Used
        by the StartTestModal's QueuePicker to let users
        slot a new run at a chosen position.
      operationId: getTestQueue
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestQueueResponse'
              type: object
      summary: Get the current test runner queue
      tags:
      - TestRun
  /api/v1/test_run/{runId}:
    get:
      description: Returns the run details with given ID. Includes a summary and a
        list of task with limited details
      operationId: getTestRun
      parameters:
      - description: ID of the test run to get details for
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestRunResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get test run by run ID
      tags:
      - TestRun
  /api/v1/test_run/{runId}/cancel:
    post:
      description: Returns the test/run id & status of the cancelled test.
      operationId: postTestRunCancel
      parameters:
      - description: ID of the test run to cancel
        in: path
        name: runId
        required: true
        type: string
      - description: Test cancellation options
        in: body
        name: cancelOptions
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestRunCancelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestRunCancelResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Cancel test run by test ID
      tags:
      - TestRun
  /api/v1/test_run/{runId}/details:
    get:
      description: Returns the run details with given ID. Includes a summary and a
        list of task with all details (incl. logs & task configurations)
      operationId: getTestRunDetails
      parameters:
      - description: ID of the test run to get details for
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestRunDetailsResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get detailed test run by run ID
      tags:
      - TestRun
  /api/v1/test_run/{runId}/result:
    get:
      description: |-
        Returns the markdown blob that tasks have collectively
        written to $ASSERTOOR_TEST_RESULT during the run, if any.
        Rendered by the UI as the run's prominent Result panel.
      operationId: getTestRunResult
      parameters:
      - description: ID of the test run
        in: path
        name: runId
        required: true
        type: string
      produces:
      - text/markdown
      - application/json
      responses:
        "200":
          description: Markdown body
          schema:
            type: string
        "204":
          description: No result set for this run
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Test run not found
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get the run-level result markdown
      tags:
      - TestRun
  /api/v1/test_run/{runId}/status:
    get:
      description: Returns the run status with given ID.
      operationId: getTestRunStatus
      parameters:
      - description: ID of the test run to get the status for
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get test run status by run ID
      tags:
      - TestRun
  /api/v1/test_run/{runId}/task/{taskIndex}/details:
    get:
      description: Returns the task details with given run ID and task index. Includes
        full log, configuration and result variables (unless security trimmed).
      operationId: getTestRunTaskDetails
      parameters:
      - description: ID of the test run
        in: path
        name: runId
        required: true
        type: string
      - description: Index of the task to get details for
        in: path
        name: taskIndex
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetTestRunDetailedTask'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get detailed task of a given test run
      tags:
      - TestRun
  /api/v1/test_run/{runId}/task/{taskIndex}/result/{resultType}/{fileId}:
    get:
      description: Returns a specific result file from a task. Requires authentication
        as results may contain sensitive data.
      operationId: getTaskResult
      parameters:
      - description: ID of the test run
        in: path
        name: runId
        required: true
        type: string
      - description: ID of the task
        in: path
        name: taskId
        required: true
        type: string
      - description: Type of file to return (summary, result, ...)
        in: path
        name: resultType
        required: true
        type: string
      - description: Index or name of the result file
        in: path
        name: fileId
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Success
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web_api.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get task result file
      tags:
      - TestRun
  /api/v1/test_runs:
    get:
      description: Returns a list of all test runs.
      operationId: getTestRuns
      parameters:
      - description: Return test runs for this test ID only
        in: query
        name: test_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/web_api.GetTestRunsResponse'
                  type: array
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get list of test runs
      tags:
      - TestRun
  /api/v1/test_runs/delete:
    post:
      consumes:
      - application/json
      - application/yaml
      description: Deletes test runs
      operationId: postTestRunsDelete
      parameters:
      - description: Test configuration (json or yaml)
        in: body
        name: testConfig
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestRunsDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestRunsDeleteResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Delete test runs
      tags:
      - TestRun
  /api/v1/test_runs/schedule:
    post:
      description: Returns the test & run id of the scheduled test execution.
      operationId: postTestRunsSchedule
      parameters:
      - description: Rest run options
        in: body
        name: runOptions
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestRunsScheduleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestRunsScheduleResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Schedule new test run by test ID
      tags:
      - TestRun
  /api/v1/tests:
    get:
      description: Returns the list of test definitions. These test definitions can
        be used to create new test runs and are supplied via the assertoor configuration.
      operationId: getTests
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/web_api.GetTestsResponse'
                  type: array
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Get list of test definitions
      tags:
      - Test
  /api/v1/tests/delete:
    post:
      consumes:
      - application/json
      - application/yaml
      description: Deletes tests
      operationId: postTestsDelete
      parameters:
      - description: Test configuration (json or yaml)
        in: body
        name: testConfig
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestsDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestsDeleteResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Delete tests
      tags:
      - Test
  /api/v1/tests/register:
    post:
      consumes:
      - application/json
      - application/yaml
      description: Returns the test id and name of the added test.
      operationId: postTestsRegister
      parameters:
      - description: Test configuration (json or yaml)
        in: body
        name: testConfig
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestsRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestsRegisterResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Register new test via yaml configuration
      tags:
      - Test
  /api/v1/tests/register_external:
    post:
      consumes:
      - application/json
      description: Returns the test id and name of the added test.
      operationId: postTestsRegisterExternal
      parameters:
      - description: Test configuration (json or yaml)
        in: body
        name: externalTestConfig
        required: true
        schema:
          $ref: '#/definitions/web_api.PostTestsRegisterExternalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.PostTestsRegisterExternalResponse'
              type: object
        "400":
          description: Failure
          schema:
            $ref: '#/definitions/web_api.Response'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/web_api.Response'
      summary: Register new test via external test configuration
      tags:
      - Test
  /api/v1/version:
    get:
      description: Returns the build version (commit hash) and release of the running
        Assertoor binary.
      operationId: getVersion
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/web_api.Response'
            - properties:
                data:
                  $ref: '#/definitions/web_api.GetVersionResponse'
              type: object
      summary: Get build version information
      tags:
      - Config
